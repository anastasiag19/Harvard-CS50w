<!DOCTYPE html>
<html lang="en">
<head>
    <title>Advanced Search</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
     <div class="advanced-wrapper">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png" alt="Google" width="150">
    <h1>Advanced Search</h1>
    <h2>Find pages with</h2>

     <nav>
    <a href="index.html">Google Search</a>
     </nav> 

     <form class="advanced-form" action="https://www.google.com/search">
        <div>
       <label>All of these words:</label>
       <input type="text" name="as_q">
       </div>
       
<div>
       <label>This exact word or phrase:</label>
       <input type="text" name="as_epq">
</div>
<div>
       <label>Any of these words:</label>
       <input type="text" name="as_oq">
</div>
<div> 
       <label>None of these words:</label>
       <input type="text" name="as_eq">
</div>
       <input type="submit" value="Advanced Search">



     </form>

</div>
    
</body>
</html>
